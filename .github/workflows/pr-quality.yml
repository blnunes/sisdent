name: PR Quality

on:
  pull_request:
    branches:
      - master

jobs:
  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Test release change classifier
        run: deploy/release/classify-change.test.sh

      - name: Classify pull request
        id: change
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          classification="$(
            deploy/release/classify-change.sh "${BASE_SHA}" "${HEAD_SHA}"
          )"
          version_bump=false
          if [[ "${classification}" == "version-bump" ]]; then
            version_bump=true
          fi

          echo "version_bump=${version_bump}" >> "${GITHUB_OUTPUT}"

      - name: Unit tests
        if: steps.change.outputs.version_bump != 'true'
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Validate next development version
        if: steps.change.outputs.version_bump == 'true'
        run: mvn --batch-mode --no-transfer-progress validate

  infrastructure-check:
    name: Infrastructure check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate shell syntax
        run: bash -n deploy/preprod/deploy.sh deploy/release/*.sh

      - name: Validate pre-production Compose model
        env:
          SISDENT_IMAGE_TAG: validation
        run: docker compose --file compose.preprod.yml config --quiet
