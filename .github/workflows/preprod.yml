name: Deploy pre-production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: true
        default: master
        type: string

concurrency:
  group: sisdent-preprod
  cancel-in-progress: false

jobs:
  quality-check:
    name: Validate selected revision
    outputs:
      commit-sha: ${{ steps.commit.outputs.sha }}
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve deployment commit
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Unit tests
        run: mvn --batch-mode --no-transfer-progress verify

  build-image:
    name: Build immutable image
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ needs.quality-check.outputs.commit-sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and publish immutable image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/blnunes/sisdent:${{ needs.quality-check.outputs.commit-sha }}
            ghcr.io/blnunes/sisdent:preprod
          labels: |
            org.opencontainers.image.revision=${{ needs.quality-check.outputs.commit-sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package deployment files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sisdent-preprod-${{ needs.quality-check.outputs.commit-sha }}
          path: |
            compose.preprod.yml
            deploy/preprod/Caddyfile
            deploy/preprod/deploy.sh
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy selected revision
    needs:
      - quality-check
      - build-image
    runs-on: [self-hosted, linux, x64, sisdent-preprod]
    timeout-minutes: 15
    environment: preprod
    permissions:
      actions: read
      contents: read
      packages: read

    steps:
      - name: Download deployment bundle
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: sisdent-preprod-${{ needs.quality-check.outputs.commit-sha }}
          path: /srv/sisdent

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy approved image
        shell: bash
        run: >-
          bash /srv/sisdent/deploy/preprod/deploy.sh
          "${{ needs.quality-check.outputs.commit-sha }}"

      - name: Verify LAN endpoint
        shell: bash
        run: |
          set -euo pipefail
          bind_address="$(sed -n 's/^SISDENT_BIND_ADDRESS=//p' /srv/sisdent/runtime.env)"
          lan_ip="$(ip -4 route get 1.1.1.1 | awk '{print $7; exit}')"

          if [[ "${bind_address}" != "0.0.0.0" &&
                "${bind_address}" != "${lan_ip}" ]]; then
            echo "SISDENT_BIND_ADDRESS must be 0.0.0.0 or the LAN IP ${lan_ip}"
            exit 1
          fi

          # Intentional HTTP on the trusted LAN. HTTPS is tracked separately.
          lan_health_url="http://${lan_ip}/actuator/health" # NOSONAR
          response="$(curl --fail --silent --show-error --max-time 10 \
            "${lan_health_url}")" # NOSONAR
          grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' <<<"${response}"
          echo "Swagger UI: http://${lan_ip}/swagger-ui/index.html" # NOSONAR
