name: Rollback production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to redeploy (for example, v0.0.3)
        required: true
        type: string

concurrency:
  group: render-production
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.release.outputs.commit }}

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Validate tag belongs to master
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use the vMAJOR.MINOR.PATCH format" >&2
            exit 1
          fi

          git fetch --force origin master:refs/remotes/origin/master --tags
          if ! git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Release tag does not exist: ${RELEASE_TAG}" >&2
            exit 1
          fi

          release_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          if ! git merge-base --is-ancestor "${release_commit}" origin/master; then
            echo "${RELEASE_TAG} does not belong to master history" >&2
            exit 1
          fi

          echo "commit=${release_commit}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ${RELEASE_TAG} to ${release_commit}"

  deploy:
    name: Roll back Render
    needs: resolve-release
    uses: ./.github/workflows/_render-deploy.yml
    with:
      commit: ${{ needs.resolve-release.outputs.commit }}
    secrets:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
