name: Rollback production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to redeploy (for example, v0.0.1)
        required: true
        type: string

concurrency:
  group: render-production
  cancel-in-progress: false

jobs:
  rollback-render:
    name: Roll back Render to ${{ inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions:
      contents: read
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use the vMAJOR.MINOR.PATCH format"
            exit 1
          fi

          git fetch --force origin \
            master:refs/remotes/origin/master \
            --tags
          if ! git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Release tag does not exist: ${RELEASE_TAG}"
            exit 1
          fi

          release_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          if ! git merge-base --is-ancestor "${release_commit}" origin/master; then
            echo "${RELEASE_TAG} does not point to a commit in master history"
            exit 1
          fi

          echo "commit=${release_commit}" >> "${GITHUB_OUTPUT}"
          echo "Resolved ${RELEASE_TAG} to ${release_commit}"

      - name: Trigger rollback deploy
        id: deploy
        shell: bash
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
        run: |
          set -euo pipefail
          : "${RENDER_API_KEY:?Missing RENDER_API_KEY secret}"
          : "${RENDER_SERVICE_ID:?Missing RENDER_SERVICE_ID secret}"

          response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"commitId\":\"${RELEASE_COMMIT}\",\"clearCache\":\"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")

          deploy_id=$(jq --raw-output '.id // empty' <<<"${response}")
          if [[ -z "${deploy_id}" ]]; then
            echo "Render did not return a deploy ID"
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Render rollback started: ${deploy_id}"

      - name: Wait for rollback
        shell: bash
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          set -euo pipefail

          for attempt in {1..120}; do
            response=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            status=$(jq --raw-output '.status' <<<"${response}")
            echo "Render rollback status: ${status}"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render rollback failed with status: ${status}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for the Render rollback"
          exit 1

      - name: Verify application health
        run: >-
          curl --fail --silent --show-error
          --retry 5 --retry-delay 5 --retry-all-errors
          https://sisdent-yhze.onrender.com/actuator/health
