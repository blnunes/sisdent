name: Render deployment

on:
  workflow_call:
    inputs:
      commit:
        description: Commit SHA from master to deploy
        required: true
        type: string
    secrets:
      RENDER_API_KEY:
        required: true
      RENDER_SERVICE_ID:
        required: true

jobs:
  deploy:
    name: Deploy commit to Render
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions: {}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Validate commit input
        shell: bash
        env:
          RELEASE_COMMIT: ${{ inputs.commit }}
        run: |
          if [[ ! "${RELEASE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Render deployment requires a full commit SHA" >&2
            exit 1
          fi

      - name: Trigger deploy
        id: deploy
        shell: bash
        env:
          RELEASE_COMMIT: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          : "${RENDER_API_KEY:?Missing RENDER_API_KEY secret}"
          : "${RENDER_SERVICE_ID:?Missing RENDER_SERVICE_ID secret}"

          response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"commitId\":\"${RELEASE_COMMIT}\",\"clearCache\":\"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")

          deploy_id=$(jq --raw-output '.id // empty' <<<"${response}")
          if [[ -z "${deploy_id}" ]]; then
            echo "Render did not return a deploy ID" >&2
            exit 1
          fi

          echo "deploy-id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Render deploy started: ${deploy_id}"

      - name: Wait for deploy
        shell: bash
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy-id }}
        run: |
          set -euo pipefail

          for attempt in {1..120}; do
            response=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            status=$(jq --raw-output '.status' <<<"${response}")
            echo "Render deploy status: ${status}"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deploy failed with status: ${status}" >&2
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for the Render deploy" >&2
          exit 1

      - name: Verify application health
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://sisdent-yhze.onrender.com/actuator/health)"
          jq --exit-status '.status == "UP"' <<<"${response}" >/dev/null
