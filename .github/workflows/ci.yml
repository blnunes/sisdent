name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Unit tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.organization=blnunes
          -Dsonar.projectKey=blnunes_sisdent
          -Dsonar.qualitygate.wait=true

  deploy:
    name: Deploy to Render
    if: github.event_name == 'push'
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger deploy
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          : "${RENDER_API_KEY:?Missing RENDER_API_KEY secret}"
          : "${RENDER_SERVICE_ID:?Missing RENDER_SERVICE_ID secret}"

          response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"commitId\":\"${GITHUB_SHA}\",\"clearCache\":\"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")

          deploy_id=$(jq --raw-output '.id // empty' <<<"${response}")
          if [[ -z "${deploy_id}" ]]; then
            echo "Render did not return a deploy ID"
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Render deploy started: ${deploy_id}"

      - name: Wait for deploy
        shell: bash
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          set -euo pipefail

          for attempt in {1..120}; do
            response=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            status=$(jq --raw-output '.status' <<<"${response}")
            echo "Render deploy status: ${status}"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deploy failed with status: ${status}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for the Render deploy"
          exit 1

      - name: Verify application health
        run: >-
          curl --fail --silent --show-error
          --retry 5 --retry-delay 5 --retry-all-errors
          https://sisdent-yhze.onrender.com/actuator/health
