name: Unit tests

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  unit-tests: 
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Run unit tests
        run: ./mvnw --batch-mode --no-transfer-progress -DexcludedGroups=integration test
