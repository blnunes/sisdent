name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: render-production
  cancel-in-progress: false

jobs:
  quality-check:
    name: Quality check
    outputs:
      version_bump: ${{ steps.change.outputs.version_bump }}
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Test release change classifier
        run: deploy/release/classify-change.test.sh

      - name: Classify push
        id: change
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          version_bump=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" &&
                "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=2 origin master
            fi

            classification="$(
              deploy/release/classify-change.sh "${BEFORE_SHA}" "${GITHUB_SHA}"
            )"
            if [[ "${classification}" == "version-bump" ]]; then
              version_bump=true
            fi
          fi

          echo "version_bump=${version_bump}" >> "${GITHUB_OUTPUT}"

      - name: Unit tests
        if: steps.change.outputs.version_bump != 'true'
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Validate next development version
        if: steps.change.outputs.version_bump == 'true'
        run: mvn --batch-mode --no-transfer-progress validate

      - name: SonarCloud
        if: >-
          github.ref == 'refs/heads/master' &&
          steps.change.outputs.version_bump != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.organization=blnunes
          -Dsonar.projectKey=blnunes_sisdent
          -Dsonar.qualitygate.wait=true

  deploy-render:
    name: Deploy to Render
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.quality-check.outputs.version_bump == 'false'
    needs: quality-check
    uses: ./.github/workflows/_render-deploy.yml
    with:
      commit: ${{ github.sha }}
    secrets:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

  tag-release:
    name: Tag deployed release
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.quality-check.outputs.version_bump == 'false'
    needs:
      - quality-check
      - deploy-render
    outputs:
      release-version: ${{ steps.release.outputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Create release tag
        id: release
        shell: bash
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          snapshot_version="$(deploy/release/version.sh project-version pom.xml)"
          release_version="$(
            deploy/release/version.sh release-version "${snapshot_version}"
          )"
          release_tag="v${release_version}"
          echo "version=${release_version}" >> "${GITHUB_OUTPUT}"

          existing_tag="$(
            git tag --points-at "${RELEASE_COMMIT}" |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sort --version-sort |
              tail -n 1 || true
          )"
          if [[ -n "${existing_tag}" ]]; then
            if [[ "${existing_tag}" != "${release_tag}" ]]; then
              echo "Commit is tagged ${existing_tag}, expected ${release_tag}" >&2
              exit 1
            fi
            echo "Commit ${RELEASE_COMMIT} is already tagged as ${existing_tag}"
            exit 0
          fi

          if git show-ref --verify --quiet "refs/tags/${release_tag}"; then
            echo "Tag ${release_tag} already points to another commit" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "${release_tag}" "${RELEASE_COMMIT}" \
            --message "Production release ${release_tag}"
          git push origin "refs/tags/${release_tag}"
          echo "Created ${release_tag} for ${RELEASE_COMMIT}"

  prepare-next-version:
    name: Prepare next development version
    needs: tag-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
      RELEASE_VERSION: ${{ needs.tag-release.outputs.release-version }}

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

      - name: Open version bump pull request
        shell: bash
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?Missing RELEASE_AUTOMATION_TOKEN secret}"

          next_snapshot="$(
            deploy/release/version.sh next-snapshot "${RELEASE_VERSION}"
          )"
          current_snapshot="$(deploy/release/version.sh project-version pom.xml)"

          if [[ "${current_snapshot}" == "${next_snapshot}" ]]; then
            echo "Master already uses ${next_snapshot}"
            exit 0
          fi

          expected_snapshot="${RELEASE_VERSION}-SNAPSHOT"
          if [[ "${current_snapshot}" != "${expected_snapshot}" ]]; then
            echo "Expected master at ${expected_snapshot}, got ${current_snapshot}" >&2
            exit 1
          fi

          branch="automation/prepare-${next_snapshot}"
          existing_pr="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --head "${branch}" \
              --base master \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "${existing_pr}" ]]; then
            gh pr merge "${existing_pr}" \
              --repo "${GITHUB_REPOSITORY}" \
              --squash \
              --auto \
              --delete-branch
            exit 0
          fi

          git switch --create "${branch}"
          sed -i \
            "0,/<version>${current_snapshot}<\\/version>/s//<version>${next_snapshot}<\\/version>/" \
            pom.xml

          mapfile -t changed_files < <(git diff --name-only)
          if [[ "${#changed_files[@]}" -ne 1 ||
                "${changed_files[0]}" != "pom.xml" ]]; then
            echo "Version preparation changed files other than pom.xml" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit --message "chore(release): prepare ${next_snapshot}"
          git push --set-upstream origin "${branch}"

          pr_url="$(
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base master \
              --head "${branch}" \
              --title "chore(release): prepare ${next_snapshot}" \
              --body "Automated post-release update after v${RELEASE_VERSION}. Changes only the Maven development version to ${next_snapshot}."
          )"
          gh pr merge "${pr_url}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --auto \
            --delete-branch
