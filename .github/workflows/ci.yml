name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feat/preprod-deployment
  pull_request:
    branches:
      - master
      - feat/preprod-deployment

jobs:
  validate-production-source:
    name: Validate production source branch
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Require pre-production branch
        run: |
          source_repository="$(jq --raw-output '.pull_request.head.repo.full_name' "$GITHUB_EVENT_PATH")"
          if [[ "$GITHUB_HEAD_REF" != "feat/preprod-deployment" || \
                "$source_repository" != "$GITHUB_REPOSITORY" ]]; then
            echo "Production pull requests must come from feat/preprod-deployment in this repository"
            exit 1
          fi

  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Unit tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.organization=blnunes
          -Dsonar.projectKey=blnunes_sisdent
          -Dsonar.qualitygate.wait=true

  build-preprod-image:
    name: Build pre-production image
    if: >-
      github.repository == 'blnunes/sisdent' &&
      github.ref == 'refs/heads/feat/preprod-deployment'
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and publish immutable image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/blnunes/sisdent:${{ github.sha }}
            ghcr.io/blnunes/sisdent:preprod
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package deployment files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sisdent-preprod-${{ github.sha }}
          path: |
            compose.preprod.yml
            deploy/preprod/Caddyfile
            deploy/preprod/deploy.sh
          if-no-files-found: error
          retention-days: 7

  deploy-render:
    name: Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger deploy
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          : "${RENDER_API_KEY:?Missing RENDER_API_KEY secret}"
          : "${RENDER_SERVICE_ID:?Missing RENDER_SERVICE_ID secret}"

          response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"commitId\":\"${GITHUB_SHA}\",\"clearCache\":\"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")

          deploy_id=$(jq --raw-output '.id // empty' <<<"${response}")
          if [[ -z "${deploy_id}" ]]; then
            echo "Render did not return a deploy ID"
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Render deploy started: ${deploy_id}"

      - name: Wait for deploy
        shell: bash
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          set -euo pipefail

          for attempt in {1..120}; do
            response=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            status=$(jq --raw-output '.status' <<<"${response}")
            echo "Render deploy status: ${status}"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deploy failed with status: ${status}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for the Render deploy"
          exit 1

      - name: Verify application health
        run: >-
          curl --fail --silent --show-error
          --retry 5 --retry-delay 5 --retry-all-errors
          https://sisdent-yhze.onrender.com/actuator/health

  deploy-preprod:
    name: Deploy to local pre-production
    if: >-
      github.repository == 'blnunes/sisdent' &&
      github.ref == 'refs/heads/feat/preprod-deployment'
    needs: build-preprod-image
    runs-on: [self-hosted, linux, x64, sisdent-preprod]
    timeout-minutes: 15
    environment: preprod
    concurrency:
      group: sisdent-preprod
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      packages: read

    steps:
      - name: Download deployment bundle
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: sisdent-preprod-${{ github.sha }}
          path: /srv/sisdent

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy approved image
        shell: bash
        run: bash /srv/sisdent/deploy/preprod/deploy.sh "${GITHUB_SHA}"

      - name: Verify LAN endpoint
        shell: bash
        run: |
          set -euo pipefail
          bind_address="$(sed -n 's/^SISDENT_BIND_ADDRESS=//p' /srv/sisdent/runtime.env)"
          lan_ip="$(ip -4 route get 1.1.1.1 | awk '{print $7; exit}')"

          if [[ "$bind_address" != "0.0.0.0" && "$bind_address" != "$lan_ip" ]]; then
            echo "SISDENT_BIND_ADDRESS must be 0.0.0.0 or the LAN IP $lan_ip"
            exit 1
          fi

          # Intentional HTTP: this health request contains no credentials and is
          # restricted to the trusted RFC 1918 LAN; router port forwarding is disabled.
          lan_health_url="http://${lan_ip}/actuator/health" # NOSONAR
          curl --fail --silent --show-error --max-time 10 "${lan_health_url}" # NOSONAR
          swagger_url="http://${lan_ip}/swagger-ui/index.html" # NOSONAR
          echo "Swagger UI: ${swagger_url}" # NOSONAR
