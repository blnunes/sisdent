name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: render-production
  cancel-in-progress: false

jobs:
  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Unit tests
        run: mvn --batch-mode --no-transfer-progress verify

      - name: SonarCloud
        if: github.ref == 'refs/heads/master'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.organization=blnunes
          -Dsonar.projectKey=blnunes_sisdent
          -Dsonar.qualitygate.wait=true

  deploy-render:
    name: Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: quality-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger deploy
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          : "${RENDER_API_KEY:?Missing RENDER_API_KEY secret}"
          : "${RENDER_SERVICE_ID:?Missing RENDER_SERVICE_ID secret}"

          response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"commitId\":\"${GITHUB_SHA}\",\"clearCache\":\"do_not_clear\"}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")

          deploy_id=$(jq --raw-output '.id // empty' <<<"${response}")
          if [[ -z "${deploy_id}" ]]; then
            echo "Render did not return a deploy ID"
            exit 1
          fi

          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Render deploy started: ${deploy_id}"

      - name: Wait for deploy
        shell: bash
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          set -euo pipefail

          for attempt in {1..120}; do
            response=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            status=$(jq --raw-output '.status' <<<"${response}")
            echo "Render deploy status: ${status}"

            case "${status}" in
              live)
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deploy failed with status: ${status}"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for the Render deploy"
          exit 1

      - name: Verify application health
        run: >-
          curl --fail --silent --show-error
          --retry 5 --retry-delay 5 --retry-all-errors
          https://sisdent-yhze.onrender.com/actuator/health

  tag-release:
    name: Tag deployed release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: deploy-render
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Create next release tag
        shell: bash
        env:
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          existing_tag="$(
            git tag --points-at "${RELEASE_COMMIT}" |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sort --version-sort |
              tail -n 1 || true
          )"
          if [[ -n "${existing_tag}" ]]; then
            echo "Commit ${RELEASE_COMMIT} is already tagged as ${existing_tag}"
            exit 0
          fi

          latest_tag="$(
            git tag --list 'v*' |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              sort --version-sort |
              tail -n 1 || true
          )"

          if [[ -z "${latest_tag}" ]]; then
            project_version="$(
              awk '
                /<artifactId>sisdent<\/artifactId>/ { project = 1 }
                project && /<version>/ {
                  version = $0
                  sub(/^.*<version>/, "", version)
                  sub(/<\/version>.*$/, "", version)
                  print version
                  exit
                }
              ' pom.xml
            )"
            next_tag="v${project_version%-SNAPSHOT}"
            if [[ ! "${next_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid initial version derived from pom.xml: ${next_tag}"
              exit 1
            fi
          else
            version="${latest_tag#v}"
            IFS=. read -r major minor patch <<<"${version}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "${next_tag}" "${RELEASE_COMMIT}" \
            --message "Production release ${next_tag}"
          git push origin "refs/tags/${next_tag}"
          echo "Created ${next_tag} for ${RELEASE_COMMIT}"
