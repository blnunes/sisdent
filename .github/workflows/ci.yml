name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25

    steps:
      - uses: actions/checkout@v6

      - run: mvn --batch-mode --no-transfer-progress verify

      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target

  sonarcloud:
    name: SonarCloud
    needs: unit-tests
    runs-on: ubuntu-latest
    container: maven:3.9.16-eclipse-temurin-25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: test-results
          path: target

      - name: Analyze code and coverage
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          mvn --batch-mode --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.organization=blnunes
          -Dsonar.projectKey=blnunes_sisdent
          -Dsonar.qualitygate.wait=true
